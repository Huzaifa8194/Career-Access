# Career Access Hub — Data Connect mutations
#
# Auth levels:
#   PUBLIC           — open endpoints (public site forms, unauthenticated apply)
#   USER             — any authenticated user (participant self-service)
#   USER_EMAIL_VERIFIED — authenticated + email verified (staff writes)
#
# For row-level enforcement we compare to `auth.uid` via _expr fields.

########################################################################
# USERS
########################################################################

# Create the profile row that mirrors a Firebase Auth account.
# Called once on first sign-in. The id is forced to the calling uid.
mutation CreateCurrentUser(
  $fullName: String!
  $email: String!
  $role: String!
) @auth(level: USER) {
  user_insert(data: {
    id_expr: "auth.uid"
    fullName: $fullName
    email: $email
    role: $role
  })
}

mutation UpdateUserRole($id: String!, $role: String!) @auth(level: USER) {
  user_update(key: { id: $id }, data: { role: $role })
}

########################################################################
# PARTICIPANTS / APPLICATIONS  (public apply flow)
########################################################################

# Creates a new participant. Runs unauthenticated for the public `/apply/intake`
# flow. The server still stamps submittedAt/lastActivityAt/riskFlag via defaults.
mutation CreateParticipant(
  $firstName: String!
  $lastName: String!
  $email: String!
  $phone: String!
  $preferredContactMethod: String!
  $address: String!
  $city: String!
  $state: String!
  $zipCode: String!
  $educationLevel: String!
  $currentlyEnrolled: Boolean!
  $programInterest: String!
  $employed: Boolean!
  $jobTitle: String
  $supportNeeded: String
  $pathway: String!
  $status: String!
  $source: String!
  $consentAccuracy: Boolean!
  $consentContact: Boolean!
  $consentDataShare: Boolean!
) @auth(level: PUBLIC) {
  participant_insert(data: {
    firstName: $firstName
    lastName: $lastName
    email: $email
    phone: $phone
    preferredContactMethod: $preferredContactMethod
    address: $address
    city: $city
    state: $state
    zipCode: $zipCode
    educationLevel: $educationLevel
    currentlyEnrolled: $currentlyEnrolled
    programInterest: $programInterest
    employed: $employed
    jobTitle: $jobTitle
    supportNeeded: $supportNeeded
    pathway: $pathway
    status: $status
    source: $source
    consentAccuracy: $consentAccuracy
    consentContact: $consentContact
    consentDataShare: $consentDataShare
  })
}

mutation CreateApplication(
  $participantId: UUID!
  $eligibilityData: String!
  $intakeData: String!
  $status: String!
  $pathwayRecommendation: String
) @auth(level: PUBLIC) {
  application_insert(data: {
    participantId: $participantId
    eligibilityData: $eligibilityData
    intakeData: $intakeData
    status: $status
    pathwayRecommendation: $pathwayRecommendation
  })
}

# Staff actions on a participant record.
mutation UpdateParticipantStatus($id: UUID!, $status: String!) @auth(level: USER) {
  participant_update(key: { id: $id }, data: {
    status: $status
    lastActivityAt_expr: "request.time"
  })
}

mutation AssignAdvisor($id: UUID!, $advisorId: String!) @auth(level: USER) {
  participant_update(key: { id: $id }, data: {
    assignedAdvisorId: $advisorId
    lastActivityAt_expr: "request.time"
  })
}

mutation UpdateParticipantPathway($id: UUID!, $pathway: String!) @auth(level: USER) {
  participant_update(key: { id: $id }, data: {
    pathway: $pathway
    lastActivityAt_expr: "request.time"
  })
}

mutation FlagParticipantRisk($id: UUID!, $riskFlag: Boolean!) @auth(level: USER) {
  participant_update(key: { id: $id }, data: {
    riskFlag: $riskFlag
    lastActivityAt_expr: "request.time"
  })
}

# Link a participant record to the authenticated user after they sign up.
mutation LinkCurrentUserToParticipant($id: UUID!) @auth(level: USER) {
  participant_update(key: { id: $id }, data: {
    userId_expr: "auth.uid"
    lastActivityAt_expr: "request.time"
  })
}

########################################################################
# REFERRALS
########################################################################

mutation CreateReferral(
  $referrerName: String!
  $organizationName: String!
  $email: String!
  $phone: String!
  $applicantFirstName: String!
  $applicantLastName: String!
  $applicantEmail: String!
  $applicantPhone: String!
  $zipCode: String!
  $programInterest: String!
  $urgency: String!
  $reason: String!
  $permissionConfirmed: Boolean!
) @auth(level: PUBLIC) {
  referral_insert(data: {
    referrerName: $referrerName
    organizationName: $organizationName
    email: $email
    phone: $phone
    applicantFirstName: $applicantFirstName
    applicantLastName: $applicantLastName
    applicantEmail: $applicantEmail
    applicantPhone: $applicantPhone
    zipCode: $zipCode
    programInterest: $programInterest
    urgency: $urgency
    reason: $reason
    permissionConfirmed: $permissionConfirmed
    status: "new"
  })
}

mutation UpdateReferralStatus($id: UUID!, $status: String!) @auth(level: USER) {
  referral_update(key: { id: $id }, data: { status: $status })
}

mutation LinkReferralToParticipant($id: UUID!, $participantId: UUID!) @auth(level: USER) {
  referral_update(key: { id: $id }, data: { linkedParticipantId: $participantId })
}

########################################################################
# APPOINTMENTS
########################################################################

# Public booking flow (/book) — participant may be anonymous.
mutation CreateAppointment(
  $contactName: String!
  $contactEmail: String!
  $contactPhone: String
  $appointmentType: String!
  $scheduledAt: Timestamp!
  $timezone: String!
) @auth(level: PUBLIC) {
  appointment_insert(data: {
    contactName: $contactName
    contactEmail: $contactEmail
    contactPhone: $contactPhone
    appointmentType: $appointmentType
    scheduledAt: $scheduledAt
    timezone: $timezone
    status: "scheduled"
  })
}

mutation UpdateAppointmentStatus($id: UUID!, $status: String!) @auth(level: USER) {
  appointment_update(key: { id: $id }, data: { status: $status })
}

mutation LinkAppointment(
  $id: UUID!
  $participantId: UUID
  $advisorId: String
) @auth(level: USER) {
  appointment_update(key: { id: $id }, data: {
    participantId: $participantId
    advisorId: $advisorId
  })
}

########################################################################
# TASKS / NOTES / DOCUMENTS / MESSAGES
########################################################################

mutation CreateTask(
  $participantId: UUID!
  $title: String!
  $description: String
  $status: String!
  $priority: String
  $dueDate: Timestamp
) @auth(level: USER) {
  task_insert(data: {
    participantId: $participantId
    title: $title
    description: $description
    status: $status
    priority: $priority
    dueDate: $dueDate
  })
}

mutation UpdateTaskStatus($id: UUID!, $status: String!) @auth(level: USER) {
  task_update(key: { id: $id }, data: { status: $status })
}

mutation CreateNote(
  $participantId: UUID!
  $content: String!
  $kind: String
) @auth(level: USER) {
  note_insert(data: {
    participantId: $participantId
    advisorId_expr: "auth.uid"
    content: $content
    kind: $kind
  })
}

mutation CreateDocument(
  $participantId: UUID!
  $fileName: String!
  $fileUrl: String!
  $storagePath: String!
  $sizeBytes: Int
  $status: String!
) @auth(level: USER) {
  document_insert(data: {
    participantId: $participantId
    fileName: $fileName
    fileUrl: $fileUrl
    storagePath: $storagePath
    sizeBytes: $sizeBytes
    status: $status
    uploadedById_expr: "auth.uid"
  })
}

mutation UpdateDocumentStatus($id: UUID!, $status: String!) @auth(level: USER) {
  document_update(key: { id: $id }, data: { status: $status })
}

mutation SendMessage(
  $participantId: UUID!
  $senderRole: String!
  $message: String!
) @auth(level: USER) {
  message_insert(data: {
    participantId: $participantId
    senderId_expr: "auth.uid"
    senderRole: $senderRole
    message: $message
    read: false
  })
}

mutation MarkMessageRead($id: UUID!) @auth(level: USER) {
  message_update(key: { id: $id }, data: { read: true })
}
